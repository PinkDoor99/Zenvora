services:
  - type: web
    name: zenvora-api
    env: node
    plan: starter
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        value: "https://zenvora.vercel.app"
      - key: JWT_SECRET
        scope: secret
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: OPENAI_API_KEY
        scope: secret
  
  - type: pserv
    name: zenvora-db
    env: sqlite
    plan: starter
    initialDbName: zenvora
    dataPersistedInvolume: true
